<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FillaHorse</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0806;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Georgia, serif;
  }

  /* ── Particle canvas ── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── URL link ── */
  .url-top {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 10; text-align: center;
    padding: 18px 20px 14px;
    background: linear-gradient(to bottom, rgba(0,0,0,.85) 60%, transparent);
  }
  .url-top a {
    color: #fff; text-decoration: none;
    font-size: clamp(18px, 4.5vw, 30px);
    font-weight: bold; letter-spacing: .08em;
    border-bottom: 2px solid rgba(200,155,40,.8);
    padding-bottom: 4px;
    text-shadow: 0 0 18px rgba(210,160,30,.9);
    transition: color .2s;
  }
  .url-top a:hover, .url-top a:active { color: #f0c040; }

  /* ── 3D stage ── */
  .stage {
    position: relative; z-index: 1;
    perspective: 900px;
    width: min(88vw, 500px);
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Logo card ── */
  .card {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transform: rotateX(0deg) rotateY(0deg);
    transition: transform .08s linear;
    display: flex; align-items: center; justify-content: center;
    will-change: transform;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { translate: 0 0; }
    50%       { translate: 0 -18px; }
  }

  /* ── Logo image / fallback ── */
  .logo-wrap {
    position: relative;
    width: 90%; height: 90%;
    display: flex; align-items: center; justify-content: center;
    transform-style: preserve-3d;
  }

  /* Glow layer behind logo */
  .logo-glow {
    position: absolute; inset: -15%;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(200,150,20,.28) 0%,
      rgba(120,80,10,.12) 45%,
      transparent 70%);
    animation: pulseGlow 4s ease-in-out infinite;
    transform: translateZ(-20px);
  }
  @keyframes pulseGlow {
    0%,100% { opacity:.7; transform: translateZ(-20px) scale(1); }
    50%      { opacity:1;  transform: translateZ(-20px) scale(1.08); }
  }

  .logo-img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 18px rgba(255,200,50,.45))
            drop-shadow(0 0 40px rgba(200,140,10,.25));
    transform: translateZ(0px);
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%,100% { filter: drop-shadow(0 0 16px rgba(255,200,50,.4)) drop-shadow(0 0 36px rgba(200,140,10,.22)); }
    50%      { filter: drop-shadow(0 0 28px rgba(255,220,80,.65)) drop-shadow(0 0 60px rgba(220,160,20,.38)); }
  }

  /* Reflection layer */
  .logo-reflect {
    position: absolute;
    bottom: -18%; left: 5%; right: 5%; height: 18%;
    background: linear-gradient(to bottom,
      rgba(200,150,20,.12) 0%,
      transparent 100%);
    transform: scaleY(-1) translateZ(-5px);
    filter: blur(4px);
    pointer-events: none;
  }

  /* ── Tagline ── */
  .tagline {
    position: fixed; bottom: 6%; left: 0; right: 0;
    text-align: center;
    color: rgba(200,150,50,.7);
    font-size: clamp(10px, 2.6vw, 15px);
    letter-spacing: .3em; text-transform: uppercase;
    text-shadow: 0 0 12px rgba(180,130,30,.5);
    z-index: 1;
  }

  /* ── Edge glow corners ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(120,80,10,.18), transparent),
      radial-gradient(ellipse 50% 35% at 90% 80%, rgba(140,90,10,.14), transparent);
  }
</style>
</head>

<div class="tagline">Supplemente &amp; Pflege für Pferde</div>

<script>
// ── Particle background ──────────────────────────────
const pc  = document.getElementById('particles');
const ctx = pc.getContext('2d');
let W, H;
const pts = [];

function resize() {
  W = pc.width  = innerWidth;
  H = pc.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 80; i++) pts.push({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.4 + .3,
  ph: Math.random() * Math.PI * 2,
  sp: .4 + Math.random() * 1.2,
});

(function loop(ts) {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    const a = .25 + .75 * Math.abs(Math.sin(p.ph + ts * .001 * p.sp));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
})();

// ── 3D tilt on mouse / device orientation ───────────
const card  = document.getElementById('card');
const stage = document.getElementById('stage');
const MAX   = 18; // max tilt degrees

let tiltX = 0, tiltY = 0;
let targetX = 0, targetY = 0;

// Mouse
stage.addEventListener('mousemove', e => {
  const r  = stage.getBoundingClientRect();
  const nx = (e.clientX - r.left  - r.width  / 2) / (r.width  / 2);
  const ny = (e.clientY - r.top   - r.height / 2) / (r.height / 2);
  targetY =  nx * MAX;
  targetX = -ny * MAX;
});
stage.addEventListener('mouseleave', () => { targetX = 0; targetY = 0; });

// Touch
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  const t  = e.touches[0];
  const r  = stage.getBoundingClientRect();
  const nx = (t.clientX - r.left  - r.width  / 2) / (r.width  / 2);
  const ny = (t.clientY - r.top   - r.height / 2) / (r.height / 2);
  targetY =  nx * MAX;
  targetX = -ny * MAX;
}, { passive: false });
stage.addEventListener('touchend', () => { targetX = 0; targetY = 0; });

// Device orientation (gyroscope on mobile)
window.addEventListener('deviceorientation', e => {
  if (e.beta == null) return;
  targetX = Math.max(-MAX, Math.min(MAX,  e.beta  * .4));
  targetY = Math.max(-MAX, Math.min(MAX,  e.gamma * .4));
});

// Smooth lerp
(function tiltLoop() {
  requestAnimationFrame(tiltLoop);
  tiltX += (targetX - tiltX) * .08;
  tiltY += (targetY - tiltY) * .08;
  card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
})();
</script>
