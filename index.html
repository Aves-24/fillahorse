<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FillaHorse</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Georgia, serif;
    gap: 4px;
  }

  /* ── Camera feed (real-world AR background) ── */
  #camera {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Logo text needs shadow to stay readable over any camera scene */
  .url-top, .stage, .tagline { position: relative; }

  .logo-img { filter: drop-shadow(0 2px 12px rgba(0,0,0,.55)); }
  .url-top a { text-shadow: 0 2px 10px rgba(0,0,0,.7); }
  .tagline   { text-shadow: 0 2px 10px rgba(0,0,0,.7); }

  /* ── URL link (right above logo) ── */
  .url-top {
    z-index: 10; text-align: center;
  }
  .url-top a {
    color: #fff; text-decoration: none;
    font-size: clamp(18px, 4.5vw, 30px);
    font-weight: bold; letter-spacing: .08em;
    border-bottom: 2px solid rgba(255,255,255,.5);
    padding-bottom: 3px;
    transition: opacity .2s;
  }
  .url-top a:hover, .url-top a:active { opacity: .7; }

  /* ── 3D stage ── */
  .stage {
    position: relative; z-index: 1;
    perspective: 900px;
    width: min(80vw, 440px);
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Logo card ── */
  .card {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transform: rotateX(0deg) rotateY(0deg);
    transition: transform .08s linear;
    display: flex; align-items: center; justify-content: center;
    will-change: transform;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { translate: 0 0; }
    50%       { translate: 0 -18px; }
  }

  /* ── Logo image / fallback ── */
  .logo-wrap {
    position: relative;
    width: 90%; height: 90%;
    display: flex; align-items: center; justify-content: center;
    transform-style: preserve-3d;
  }

  .logo-img {
    width: 100%; height: 100%;
    object-fit: contain;
    transform: translateZ(0px);
  }

  /* ── Subtitle (below logo) ── */
  .tagline {
    z-index: 1;
    text-align: center;
    color: rgba(255,255,255,.92);
    font-size: clamp(13px, 3.4vw, 20px);
    letter-spacing: .04em;
    font-style: italic;
  }

  /* ── AR panorama world ── */
  .world {
    position: fixed; top: 0; left: -100vw;
    width: 300vw; height: 100dvh;
    display: flex; z-index: 1;
    will-change: transform;
  }
  .panel {
    width: 100vw; height: 100dvh; flex: 0 0 100vw;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 64px 18px;
  }
  .panel.center { gap: 4px; }

  .side-label {
    color: #fff; font-size: clamp(18px, 5vw, 28px); font-weight: bold;
    letter-spacing: .1em; text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0,0,0,.85);
    margin-bottom: 4px;
  }
  .products {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center; align-items: stretch;
    width: 100%; max-width: 460px;
  }
  .product-card {
    width: min(42vw, 195px);
    background: rgba(18,18,18,.42);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 18px; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  .pc-img {
    width: 100%; aspect-ratio: 1/1; border-radius: 12px;
    background: #fff center/cover no-repeat;
  }
  .pc-name {
    color: #fff; font-size: clamp(13px, 3.4vw, 16px); font-weight: bold;
    text-align: center; line-height: 1.25;
    text-shadow: 0 1px 6px rgba(0,0,0,.6);
  }
  .pc-btn {
    background: rgba(255,255,255,.92); color: #000; border: none;
    border-radius: 50px; padding: 9px 0; font-family: Georgia, serif;
    font-size: 14px; font-weight: bold; cursor: pointer; transition: .15s;
  }
  .pc-btn:active { transform: scale(.96); }

  /* ── Product description modal ── */
  #modal {
    position: fixed; inset: 0; z-index: 40;
    display: flex; align-items: flex-end; justify-content: center;
    background: rgba(0,0,0,0); backdrop-filter: blur(0);
    -webkit-backdrop-filter: blur(0);
    pointer-events: none; transition: background .3s, backdrop-filter .3s;
  }
  #modal.open {
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    pointer-events: auto;
  }
  .modal-card {
    width: 100%; max-width: 440px;
    background: #111; border-radius: 26px 26px 0 0;
    padding: 18px 22px 32px;
    transform: translateY(100%);
    transition: transform .38s cubic-bezier(.2,.85,.25,1);
    display: flex; flex-direction: column; gap: 14px; align-items: center;
    box-shadow: 0 -10px 40px rgba(0,0,0,.5);
    max-height: 88dvh; overflow-y: auto;
  }
  #modal.open .modal-card { transform: translateY(0); }
  .modal-close {
    align-self: flex-end; background: none; border: none; color: #888;
    font-size: 26px; line-height: 1; cursor: pointer; padding: 0;
  }
  .modal-img {
    width: 130px; height: 130px; border-radius: 18px;
    background: #fff center/cover no-repeat;
  }
  .modal-name { color: #fff; font-size: 23px; text-align: center; }
  .modal-desc {
    color: rgba(255,255,255,.82); font-size: 15px; line-height: 1.6;
    text-align: center; font-style: normal;
  }
  .modal-link {
    margin-top: 6px; background: #fff; color: #000; text-decoration: none;
    padding: 13px 32px; border-radius: 50px; font-weight: bold; font-size: 16px;
    transition: .15s;
  }
  .modal-link:active { transform: scale(.97); }

  /* ── Look-around hint ── */
  .hint {
    position: fixed; bottom: 16px; left: 0; right: 0; z-index: 5;
    text-align: center; color: rgba(255,255,255,.85);
    font-size: 13px; letter-spacing: .08em;
    text-shadow: 0 2px 8px rgba(0,0,0,.85);
    animation: hintPulse 2.4s ease-in-out infinite;
    pointer-events: none; transition: opacity .5s;
  }
  @keyframes hintPulse { 0%,100% { opacity:.45; } 50% { opacity:1; } }

  /* ── Start screen (camera permission) ── */
  #start {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; gap: 26px; text-align: center; padding: 32px;
  }
  #start .s-logo {
    width: min(60vw, 240px);
  }
  #start .s-logo svg { width: 100%; height: auto; }
  #startBtn {
    background: #fff; color: #000; border: none; border-radius: 50px;
    padding: 15px 38px; font-size: clamp(16px, 4vw, 21px); font-weight: bold;
    letter-spacing: .04em; cursor: pointer; font-family: Georgia, serif;
    transition: .15s;
  }
  #startBtn:active { transform: scale(.96); }
  #err { color: #ff8877; font-size: 13px; display: none; max-width: 280px; }
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<div class="world" id="world">

<!-- LEFT: Bestseller -->
<section class="panel side left">
  <div class="side-label">★ Bestseller</div>
  <div class="products" id="leftProducts" data-cat="bestseller"></div>
</section>

<!-- CENTER: Logo -->
<section class="panel center">

<div class="url-top">

</div>

      audio: false,
    });
    const vid = document.getElementById('camera');
    vid.srcObject = stream;
    await vid.play();
    // Ask for gyroscope permission on iOS 13+
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try { await DeviceOrientationEvent.requestPermission(); } catch(_) {}
    }
    document.getElementById('start').style.display = 'none';
  } catch(e) {
    err.style.display = 'block';
    err.textContent = e.name === 'NotAllowedError'
      ? 'Kein Kamerazugriff. Bitte in den Einstellungen erlauben.'
      : 'Kamerafehler: ' + e.message;
  }
});

// ── 3D tilt on mouse / device orientation ───────────
const card  = document.getElementById('card');
const stage = document.getElementById('stage');
const MAX   = 18; // max tilt degrees

let tiltX = 0, tiltY = 0;
let targetX = 0, targetY = 0;

// Mouse
stage.addEventListener('mousemove', e => {
  const r  = stage.getBoundingClientRect();
  const nx = (e.clientX - r.left  - r.width  / 2) / (r.width  / 2);
  const ny = (e.clientY - r.top   - r.height / 2) / (r.height / 2);
  targetY =  nx * MAX;
  targetX = -ny * MAX;
});
stage.addEventListener('mouseleave', () => { targetX = 0; targetY = 0; });

// Touch
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  const t  = e.touches[0];
  const r  = stage.getBoundingClientRect();
  const nx = (t.clientX - r.left  - r.width  / 2) / (r.width  / 2);
  const ny = (t.clientY - r.top   - r.height / 2) / (r.height / 2);
  targetY =  nx * MAX;
  targetX = -ny * MAX;
}, { passive: false });
stage.addEventListener('touchend', () => { targetX = 0; targetY = 0; });

// Device orientation (gyroscope on mobile)
window.addEventListener('deviceorientation', e => {
  if (e.beta == null) return;
  targetX = Math.max(-MAX, Math.min(MAX,  e.beta  * .4));
  targetY = Math.max(-MAX, Math.min(MAX,  e.gamma * .4));
});

// Smooth lerp
(function tiltLoop() {
  requestAnimationFrame(tiltLoop);
  tiltX += (targetX - tiltX) * .08;
  tiltY += (targetY - tiltY) * .08;
  card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
})();


// ═══════════════════════════════════════════════════════
//  PRODUKTE — hier echte Daten eintragen
//  (img: Bild-URL · name · desc: Beschreibung · link: Produktseite)
// ═══════════════════════════════════════════════════════
const PRODUCTS = {
  bestseller: [
    { name: 'Produkt 1', img: '', desc: 'Hier kommt die Produktbeschreibung. Natürliche Inhaltsstoffe für die optimale Pflege deines Pferdes.', link: 'https://www.fillahorse.de' },
    { name: 'Produkt 2', img: '', desc: 'Hier kommt die Produktbeschreibung. Bewährte Rezeptur, von Tierärzten empfohlen.', link: 'https://www.fillahorse.de' },
  ],
  empfehlung: [
    { name: 'Produkt 3', img: '', desc: 'Hier kommt die Produktbeschreibung. Ideal zur täglichen Anwendung.', link: 'https://www.fillahorse.de' },
    { name: 'Produkt 4', img: '', desc: 'Hier kommt die Produktbeschreibung. Premium-Qualität für anspruchsvolle Pferdebesitzer.', link: 'https://www.fillahorse.de' },
  ],
};

// ── Render product cards ──
function renderProducts(cat, container) {
  container.innerHTML = PRODUCTS[cat].map((p, i) => `
    <div class="product-card">
      <div class="pc-img" style="background-image:url('${p.img}')"></div>
      <div class="pc-name">${p.name}</div>
      <button class="pc-btn" data-cat="${cat}" data-i="${i}">Beschreibung</button>
    </div>`).join('');
}
renderProducts('bestseller', document.getElementById('leftProducts'));
renderProducts('empfehlung',  document.getElementById('rightProducts'));

// ── Modal ──
const modal     = document.getElementById('modal');
const modalImg  = document.getElementById('modalImg');
const modalName = document.getElementById('modalName');
const modalDesc = document.getElementById('modalDesc');
const modalLink = document.getElementById('modalLink');

document.addEventListener('click', e => {
  const btn = e.target.closest('.pc-btn');
  if (!btn) return;
  const p = PRODUCTS[btn.dataset.cat][+btn.dataset.i];
  modalImg.style.backgroundImage = `url('${p.img}')`;
  modalName.textContent = p.name;
  modalDesc.textContent = p.desc;
  modalLink.href = p.link;
  modal.classList.add('open');
});
document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

// ── Panorama navigation (tilt + swipe) ──
const world  = document.getElementById('world');
const hint   = document.getElementById('hint');
const MAXG    = 22;          // tilt degrees for full swing
let navTarget = 0, navCur = 0;
let navDrag = false, navStartTouch = 0, navStartX = 0, navLastTouch = 0, navMoved = false;
let interacted = false;

function clampN(v, a, b) { return Math.max(a, Math.min(b, v)); }
function markInteracted() {
  if (!interacted) { interacted = true; hint.style.opacity = '0'; }
}

// Gyroscope: tilt phone left/right
window.addEventListener('deviceorientation', e => {
  if (e.gamma == null) return;
  if (navDrag || performance.now() - navLastTouch < 1500) return;
  navTarget = clampN(e.gamma / MAXG, -1, 1) * 100;
  if (Math.abs(navTarget) > 15) markInteracted();
});

// Pointer / touch swipe
function navPointerStart(x) { navDrag = true; navMoved = false; navStartTouch = x; navStartX = navCur; }
function navPointerMove(x) {
  if (!navDrag) return;
  const dx = (x - navStartTouch) / window.innerWidth * 100;
  if (Math.abs(x - navStartTouch) > 8) { navMoved = true; markInteracted(); }
  navTarget = clampN(navStartX + dx, -100, 100);
  navLastTouch = performance.now();
}
function navPointerEnd() {
  if (!navDrag) return;
  navDrag = false; navLastTouch = performance.now();
  navTarget = Math.round(navTarget / 100) * 100;   // snap to nearest panel
}

window.addEventListener('touchstart', e => navPointerStart(e.touches[0].clientX), { passive: true });
window.addEventListener('touchmove',  e => { navPointerMove(e.touches[0].clientX); if (navMoved) e.preventDefault(); }, { passive: false });
window.addEventListener('touchend', navPointerEnd);

let navMouseDown = false;
window.addEventListener('mousedown', e => { navMouseDown = true; navPointerStart(e.clientX); });
window.addEventListener('mousemove', e => { if (navMouseDown) navPointerMove(e.clientX); });
window.addEventListener('mouseup', () => { navMouseDown = false; navPointerEnd(); });

(function navLoop() {
  requestAnimationFrame(navLoop);
  navCur += (navTarget - navCur) * 0.12;
  world.style.transform = `translateX(${navCur}vw)`;
})();
</script>
