<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FillaHorse AR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100dvh;
    font-family: Georgia, serif;
  }

  /* ── Camera feed (real world background) ── */
  #camera {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ── Three.js canvas (transparent overlay) ── */
  #canvas3d {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* ── URL badge floating above horse ── */
  #url-badge {
    position: fixed;
    left: 50%;
    top: 18%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: auto;
    display: none; /* shown after camera starts */
  }

  #url-badge a {
    display: inline-block;
    color: #fff;
    text-decoration: none;
    font-size: clamp(20px, 5.5vw, 34px);
    font-weight: bold;
    letter-spacing: 0.07em;
    padding: 10px 24px 10px;
    border-radius: 50px;
    background: rgba(0,0,0,0.52);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(200,150,30,0.7);
    text-shadow: 0 0 16px rgba(210,150,20,0.9);
    box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 40px rgba(180,120,10,0.25);
    transition: background 0.2s, transform 0.1s;
  }

  #url-badge a:hover,
  #url-badge a:active {
    background: rgba(180,110,0,0.65);
    transform: scale(1.04);
  }

  /* ── Start screen ── */
  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0614;
    gap: 32px;
    text-align: center;
    padding: 32px;
  }

  #start-screen .logo {
    color: #fff;
    font-size: clamp(22px, 6vw, 40px);
    font-weight: bold;
    letter-spacing: 0.08em;
    border-bottom: 3px solid #c88c20;
    padding-bottom: 6px;
    text-shadow: 0 0 20px rgba(200,140,20,0.8);
  }

  #start-screen p {
    color: rgba(255,255,255,0.65);
    font-size: clamp(14px, 3.5vw, 18px);
    max-width: 320px;
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  #start-btn {
    background: #c88c20;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 40px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    letter-spacing: 0.06em;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(200,140,20,0.5);
    transition: background 0.2s, transform 0.1s;
  }
  #start-btn:active { transform: scale(0.97); }

  #err-msg {
    color: #ff7766;
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>

<!-- Background: real camera -->
<video id="camera" autoplay playsinline muted></video>

<!-- 3D horse (transparent canvas) -->
<canvas id="canvas3d"></canvas>

<!-- Floating URL above horse -->
<div id="url-badge">
  <a href="https://www.fillahorse.de" target="_blank" rel="noopener">www.fillahorse.de</a>
</div>

<!-- Start / permission screen -->
<div id="start-screen">
  <div class="logo">www.fillahorse.de</div>
  <p>Naciśnij przycisk aby uruchomić kamerę i zobaczyć galopującego konia w rzeczywistości rozszerzonej.</p>
  <button id="start-btn">▶ Uruchom AR</button>
  <div id="err-msg"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── Three.js scene (transparent) ─────────────────────
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('canvas3d'),
  antialias: true,
  alpha: true,           // transparent background!
  premultipliedAlpha: false,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0x000000, 0);   // fully transparent
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
// NO background — camera video shows through

const camera = new THREE.PerspectiveCamera(45, W() / H(), 0.1, 200);
camera.position.set(0, 1.2, 5.5);
camera.lookAt(0, 0.8, 0);

// ── Lighting ──────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff0d0, 4.5);
sun.position.set(3, 6, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);

const fill = new THREE.DirectionalLight(0xa0b8ff, 1.2);
fill.position.set(-4, 3, -2);
scene.add(fill);

scene.add(new THREE.AmbientLight(0xffffff, 1.8));

// ── Shadow disc (invisible ground, just catches shadow) ──
const shadowGeo  = new THREE.PlaneGeometry(8, 8);
const shadowMat  = new THREE.ShadowMaterial({ opacity: 0.28 });
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// ── Horse ─────────────────────────────────────────────
let mixer, clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Horse.glb',
  (gltf) => {
    const mesh = gltf.scene.children[0];
    mesh.castShadow = true;
    mesh.receiveShadow = false;

    // Rotate for left-profile view (horse gallops left)
    mesh.rotation.y = Math.PI / 2;

    // Auto-scale by height
    const box  = new THREE.Box3().setFromObject(mesh);
    const size = box.getSize(new THREE.Vector3());
    const scale = 1.5 / size.y;
    mesh.scale.setScalar(scale);

    // Sit on shadow plane (y=0)
    mesh.updateMatrixWorld(true);
    const box2 = new THREE.Box3().setFromObject(mesh);
    mesh.position.y = -box2.min.y;

    scene.add(mesh);

    // Animate gallop in place
    mixer = new THREE.AnimationMixer(mesh);
    mixer.clipAction(gltf.animations[0]).play();
  },
  undefined,
  (err) => console.error('GLB error:', err)
);

// ── Resize ────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// ── Render loop ───────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (mixer) mixer.update(clock.getDelta());
  renderer.render(scene, camera);
}
animate();

// ── Camera (AR background) ────────────────────────────
async function startAR() {
  const errEl = document.getElementById('err-msg');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
      },
      audio: false,
    });
    const video = document.getElementById('camera');
    video.srcObject = stream;
    await video.play();

    // Show UI, hide start screen
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('url-badge').style.display    = 'block';

  } catch (e) {
    errEl.style.display = 'block';
    if (e.name === 'NotAllowedError') {
      errEl.textContent = 'Brak dostępu do kamery. Zezwól na kamerę w ustawieniach.';
    } else {
      errEl.textContent = 'Błąd kamery: ' + e.message;
    }
  }
}

document.getElementById('start-btn').addEventListener('click', startAR);
</script>

</body>
</html>
